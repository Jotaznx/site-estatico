version: 0.2

phases:
  install:
    commands:
      - echo "No build step for static site"
  build:
    commands:
      - echo "Ready to deploy"
  post_build:
    commands:
      # Sincroniza apenas arquivos do site para o bucket
      - aws s3 sync ./ s3://site-estatico-joao-task --delete --exclude "buildspec.yml" --exclude ".git/*"
artifacts:
  files:
    - '**/*'
    - '!buildspec.yml'
    - '!.git/*'
